services:
  apm-db:
    image: postgres:16-alpine
    container_name: apm-prod-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: apm
      POSTGRES_USER: apm
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /root/apm-production-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apm"]
      interval: 5s
      timeout: 3s
      retries: 10

  apm:
    build:
      context: .
      dockerfile: Dockerfile.apm
      args:
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    container_name: apm-production
    restart: unless-stopped
    ports:
      - "4001:3000"
    volumes:
      - /root/apm-production-data/uploads:/data/uploads
    environment:
      - DB_HOST=apm-db
      - DB_PORT=5432
      - DB_NAME=apm
      - DB_USER=apm
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=production
      - PORT=3000
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - GOOGLE_CALENDAR_REDIRECT_URI=${GOOGLE_CALENDAR_REDIRECT_URI}
      - MAIL_ENCRYPTION_KEY=${MAIL_ENCRYPTION_KEY}
    depends_on:
      apm-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
